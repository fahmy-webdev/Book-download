<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Download</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border: 1px solid #ccc;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
        }
        .book-cover {
            width: 400px;
            height: auto;
        }
        .download-link {
            display: block;
            margin-top: 20px;
            font-size: 18px;
            text-decoration: none;
            color: #000;
            background-color: #f0f0f0;
            padding: 10px 20px;
            border-radius: 5px;
        }
        .download-link:hover {
            background-color: #ccc;
        }
        .download-text {
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="./images/black cover.jpg" alt="Book Cover" class="book-cover">
        <div class="download-text">Download here</div>
        <a href="https://drive.google.com/drive/u/1/folders/1UgsEZk7v_avail9d4H8Xfu7D65coZSrs" download class="download-link">Download Book</a>
    </div>
</body>
</html>
